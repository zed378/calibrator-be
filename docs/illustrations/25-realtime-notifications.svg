<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .text { fill: #f8fafc; font-family: -apple-system, system-ui, sans-serif; }
      .box { fill: #1e293b; stroke: #a855f7; stroke-width: 2; rx: 8; }
      .title { font-size: 24px; font-weight: bold; }
      .subtitle { font-size: 14px; fill: #94a3b8; }
      .line { stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrow); fill: none; }
      .label { font-size: 12px; fill: #c084fc; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" class="bg"/>
  <text x="400" y="40" text-anchor="middle" class="text title">Real-time Notification Architecture (Socket.io)</text>
  
  <rect x="50" y="100" width="150" height="60" class="box"/>
  <text x="125" y="135" text-anchor="middle" class="text">Client</text>
  
  <path d="M 200 130 L 300 130" class="line"/>
  <text x="250" y="120" text-anchor="middle" class="label">JWT Handshake</text>
  
  <rect x="300" y="100" width="150" height="60" class="box"/>
  <text x="375" y="135" text-anchor="middle" class="text">Socket.io Server</text>

  <path d="M 450 120 L 550 90" class="line"/>
  <text x="500" y="90" text-anchor="middle" class="label">Join Room</text>
  <rect x="550" y="60" width="150" height="40" class="box"/>
  <text x="625" y="85" text-anchor="middle" class="text">user_{id}</text>

  <path d="M 450 140 L 550 170" class="line"/>
  <text x="500" y="170" text-anchor="middle" class="label">Join Room</text>
  <rect x="550" y="150" width="150" height="40" class="box"/>
  <text x="625" y="175" text-anchor="middle" class="text">tenant_{id}</text>

  <rect x="300" y="300" width="150" height="60" class="box"/>
  <text x="375" y="335" text-anchor="middle" class="text">Backend Service</text>

  <path d="M 375 300 L 375 160" class="line"/>
  <text x="385" y="230" class="label">getIo().to().emit()</text>

</svg>
