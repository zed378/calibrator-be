<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .text { fill: #f8fafc; font-family: -apple-system, system-ui, sans-serif; }
      .box { fill: #1e293b; stroke: #f59e0b; stroke-width: 2; rx: 8; }
      .title { font-size: 24px; font-weight: bold; }
      .subtitle { font-size: 14px; fill: #94a3b8; }
      .line { stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrow); fill: none; }
      .label { font-size: 12px; fill: #fbbf24; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" class="bg"/>
  <text x="400" y="40" text-anchor="middle" class="text title">Audit Trail &amp; Compliance Logging</text>
  
  <rect x="50" y="100" width="150" height="60" class="box"/>
  <text x="125" y="135" text-anchor="middle" class="text">User Action (API)</text>
  
  <path d="M 200 130 L 300 130" class="line"/>
  <text x="250" y="120" text-anchor="middle" class="label">Middleware</text>
  
  <rect x="300" y="100" width="150" height="60" class="box"/>
  <text x="375" y="135" text-anchor="middle" class="text">System Modification</text>

  <path d="M 450 130 L 550 130" class="line"/>
  <text x="500" y="120" text-anchor="middle" class="label">After Hook</text>
  
  <rect x="550" y="100" width="150" height="60" class="box"/>
  <text x="625" y="135" text-anchor="middle" class="text">Audit Service</text>

  <path d="M 625 160 L 625 250" class="line"/>
  <text x="635" y="210" class="label">Append Only Insert</text>
  
  <rect x="550" y="250" width="150" height="60" class="box"/>
  <text x="625" y="285" text-anchor="middle" class="text">Audit Logs DB Table</text>

  <path d="M 550 280 L 450 280" class="line"/>
  <text x="500" y="270" text-anchor="middle" class="label">Read Only</text>
  
  <rect x="300" y="250" width="150" height="60" class="box"/>
  <text x="375" y="285" text-anchor="middle" class="text">Compliance Report</text>
</svg>
